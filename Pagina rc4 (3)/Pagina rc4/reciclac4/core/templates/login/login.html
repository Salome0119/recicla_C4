{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión - RC4</title>

    <style>
        :root {
            --green-dark: #1b4332;   
            --green-medium: #2e7d32; 
            --green-bright: #388e3c; 
            --green-light: #66bb6a;  
            --green-bg: #dcedc1;     
            --green-bg-light: #a8e6cf;
            --text-dark: #2f4f4f;
            --white: #ffffff;
            --border-color: #c8e6c9;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, var(--green-bg-light), var(--green-bg));
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .brand-card {
            width: 400px;
            padding: 22px 25px;
            background: var(--white);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
            border: 2px solid var(--border-color);
            animation: fadeIn 0.8s ease;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            background: var(--green-light);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            color: var(--white);
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
        }

        .brand-title {
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--green-dark);
            letter-spacing: .5px;
        }

        .login-card {
            background: var(--white);
            width: 380px;
            padding: 35px 40px;
            border-radius: 22px;
            border: 2px solid var(--border-color);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.18);
            animation: fadeIn 0.7s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-title {
            text-align: center;
            color: var(--green-dark);
            font-size: 1.8rem;
            margin-bottom: 1.2rem;
            font-weight: 700;
        }

        label {
            font-weight: 600;
            color: var(--green-dark);
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 11px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            background-color: #f6fff6;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--green-bright);
            box-shadow: 0 0 8px rgba(56, 142, 60, 0.35);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, var(--green-light), var(--green-bright));
            border: none;
            border-radius: 10px;
            color: var(--white);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: linear-gradient(90deg, var(--green-bright), var(--green-dark));
            transform: scale(1.05);
            box-shadow: 0px 8px 18px rgba(0,0,0,0.2);
        }

        .register-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--green-medium);
        }

        .register-link a {
            color: var(--green-medium);
            font-weight: 600;
            text-decoration: none;
        }

        .register-link a:hover {
            color: var(--green-dark);
        }

        /* Estilo de los mensajes dentro de la card */
        .msg-box {
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-align: center;
            border: 1px solid;
        }
    </style>
</head>

<body>

    <div class="brand-card">
        <div class="brand-icon">♻️</div>
        <div class="brand-title">Recicla Comuna 4</div>
    </div>

    <div class="login-card">
        <h2 class="login-title">Iniciar Sesión</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="msg-box"
                     style="
                        {% if message.tags == 'error' %}
                            background:#ffebee; color:#c62828; border-color:#ffcdd2;
                        {% else %}
                            background:#e8f5e8; color:#2e7d32; border-color:#c8e6c9;
                        {% endif %}
                     ">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>Correo</label>
            <input type="email" name="correo" required>

            <label>Contraseña</label>
            <input type="password" name="contrasena" required>

            <button type="submit">Ingresar</button>

            <p style="text-align: center; margin-top: 10px;">
                <a href="{% url 'password_reset_request' %}"
                   style="color: var(--green-dark); text-decoration: underline;">
                    ¿Olvidaste tu contraseña?
                </a>
            </p>

            <p class="register-link">
                ¿No tienes cuenta?
                <a href="{% url 'register' %}">Crear cuenta</a>
            </p>
        </form>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>No tienes permisos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #ff4d4f;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            margin-bottom: 30px;
        }
        a {
            text-decoration: none;
            color: #fff;
            background: #1890ff;
            padding: 12px 25px;
            border-radius: 8px;
        }
        a:hover {
            background: #40a9ff;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚫 Acceso denegado</h1>
        <p>No tienes permisos para ver esta página.</p>
        <a href="{% url 'login' %}">Iniciar sesión</a>
    </div>
</body>
</html>

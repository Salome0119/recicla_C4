{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña</title>
    <style>
        :root {
            --green-dark: #1b4332;   
            --green-medium: #2e7d32; 
            --green-bright: #388e3c; 
            --green-light: #66bb6a;  
            --green-bg: #dcedc1;     
            --green-bg-light: #a8e6cf;
            --text-dark: #2f4f4f;
            --white: #ffffff;
            --border-color: #c8e6c9;
            --admin-color: #264653; 
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--green-bg-light), var(--green-bg));
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        .card {
            background-color: var(--white);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            box-sizing: border-box;
        }

        .header { text-align: center; margin-bottom: 1.5rem; }
        .icon { 
            font-size: 2.5rem; 
            display: block; 
            margin-bottom: 0.5rem; 
            color: var(--green-bright); 
        }
        .header h2 { 
            margin: 0; 
            font-weight: 700; 
            font-size: 1.5rem; 
            color: var(--green-dark);
        }

        .field { margin-bottom: 1rem; }
        .field label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: 600; 
            font-size: 0.9rem; 
            color: var(--green-dark);
        }
        .field input { 
            width: 100%; 
            padding: 10px; 
            border: 2px solid var(--border-color); 
            border-radius: 8px; 
            box-sizing: border-box; 
            background-color: #f9fff9;
        }
        .field input:focus { 
            outline: none; 
            border-color: var(--green-bright); 
            box-shadow: 0px 0px 8px rgba(56, 142, 60, 0.3);
        }

        .btn { 
            width: 100%; 
            padding: 12px; 
            margin-top: 1rem; 
            color: var(--white); 
            background: linear-gradient(90deg, var(--green-light), var(--green-bright)); 
            border: none; 
            border-radius: 10px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease; 
        }
        .btn:hover {
            background: linear-gradient(90deg, var(--green-bright), var(--green-dark));
            transform: scale(1.05);
            box-shadow: 0px 6px 15px rgba(0,0,0,0.2);
        }

        .footer-link { 
            text-align: center; 
            margin-top: 1.5rem; 
            font-size: 0.9rem; 
        }
        .footer-link a { 
            color: var(--green-medium); 
            font-weight: 600; 
            text-decoration: none; 
        }
        .footer-link a:hover { 
            color: var(--green-dark);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <span class="icon">🔒</span>
            <h2>Nueva contraseña</h2>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="field">
                <label for="nueva_contrasena">Nueva contraseña</label>
                <input type="password" id="nueva_contrasena" name="nueva_contrasena" required>
            </div>

            <div class="field">
                <label for="confirmar_contrasena">Confirmar contraseña</label>
                <input type="password" id="confirmar_contrasena" name="confirmar_contrasena" required>
            </div>

            <button type="submit" class="btn">Actualizar contraseña</button>
        </form>

        <div class="footer-link">
            <a href="{% url 'login' %}">Volver al inicio de sesión</a>
        </div>
    </div>
</body>
</html>

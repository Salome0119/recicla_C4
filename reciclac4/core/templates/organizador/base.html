{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>{% block titulo %}{% endblock %}</title>
    {% block cabeza_extra %}{% endblock %}
</head>
<body>
    {% block cuerpo %}
    {% endblock %}

    <script>
const openSidebarBtn = document.getElementById('openSidebar');
const closeSidebarBtn = document.getElementById('closeSidebar');
const sidebar = document.getElementById('sidebar');
const mainContent = document.getElementById('mainContent');

function openSidebar() {
    sidebar.classList.add('active');
    mainContent.style.transform = 'translateX(260px)';
}
function closeSidebar() {
    sidebar.classList.remove('active');
    mainContent.style.transform = 'translateX(0)';
}

openSidebarBtn.addEventListener('click', () => {
    if(sidebar.classList.contains('active')) closeSidebar();
    else openSidebar();
});

if(closeSidebarBtn) closeSidebarBtn.addEventListener('click', closeSidebar);

// Submenú toggle
document.querySelectorAll('.submenu-toggle').forEach(toggle => {
    toggle.addEventListener('click', (e) => {
        e.preventDefault();           // Evita que siga el enlace
        e.stopPropagation();          // Evita que el clic cierre el sidebar
        toggle.parentElement.classList.toggle('active');
    });
});

// Enlaces normales cierran el sidebar
sidebar.querySelectorAll('a').forEach(a => {
    if(!a.classList.contains('submenu-toggle')) {
        a.addEventListener('click', closeSidebar);
    }
});

// Close on Escape
document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && sidebar.classList.contains('active')) closeSidebar();
});

document.querySelectorAll('.submenu-toggle').forEach(toggle => {
  const parent = toggle.parentElement; // li.submenu-parent
  const submenu = parent.querySelector('.submenu');

  toggle.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation(); // evita que el clic cierre otro menú
    submenu.classList.toggle('active'); // solo alterna la visibilidad de este submenú
  });
});

// Cerrar submenús si se hace clic fuera
document.addEventListener('click', (e) => {
  document.querySelectorAll('.submenu.active').forEach(sm => {
    if (!sm.parentElement.contains(e.target)) {
      sm.classList.remove('active');
    }
  });
});

</script>

<script src="{% static 'js/validaciones.js' %}"></script>

</body>
</html>

{% extends "administrador/base.html" %}
{% load static %}

{% block titulo %}Asignar Puntaje{% endblock %}

{% block cabeza_extra %}
<style>
    /* ===== Página Asignar Puntaje ===== */

    .puntaje-card {
        background: white;
        padding: 28px;
        border-radius: var(--radius);
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        max-width: 480px;
        margin: 0 auto;
        border-left: 6px solid var(--primary);
    }

    .puntaje-card h2 {
        font-size: 22px;
        font-weight: 700;
        color: var(--dark);
        margin-bottom: 18px;
    }

    .puntaje-card label {
        font-weight: 600;
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
    }

    .puntaje-card input,
    .puntaje-card select {
        width: 100%;
        padding: 12px;
        border-radius: var(--radius);
        border: 1px solid #ccc;
        margin-bottom: 18px;
        transition: 0.25s;
    }

    .puntaje-card input:focus,
    .puntaje-card select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 6px rgba(46, 204, 113, 0.45);
        outline: none;
    }

    /* Botón Guardar */
    .btn-submit {
        width: 100%;
        background: var(--primary);
        color: white;
        padding: 12px;
        border-radius: var(--radius);
        font-size: 16px;
        font-weight: 600;
        border: none;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-submit:hover {
        background: var(--secondary);
        transform: translateY(-2px);
    }

    /* Botón Volver */
    .btn-back {
        display: inline-block;
        margin-top: 18px;
        padding: 10px 16px;
        background: var(--light);
        color: var(--dark);
        font-weight: 600;
        border-radius: var(--radius);
        text-decoration: none;
        transition: 0.25s;
    }

    .btn-back:hover {
        background: var(--primary);
        color: white;
        transform: translateY(-2px);
    }
</style>
{% endblock %}

{% block cuerpo %}
<div class="page-container">
    <div class="puntaje-card">
        <h2>Asignar puntaje a {{ usuario.nombre }} {{ usuario.apellido }}</h2>

        <form method="POST">
            {% csrf_token %}

            <label>Puntos:</label>
            {{ form.puntos }}

            <button type="submit" class="btn-submit">Guardar</button>
        </form>

        <a href="{% url 'historial_puntaje' usuario.id_usuario %}" class="btn-back">⬅️ Volver</a>
    </div>
</div>
{% endblock %}
